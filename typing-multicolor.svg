<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="60">
  <style>
    .text {
      font: 700 28px 'Fira Code', monospace;
      animation: colorchange 8s infinite;
    }

    @keyframes colorchange {
      0%   { fill: #ec4899; }
      20%  { fill: #0ea5e9; }
      40%  { fill: #22c55e; }
      60%  { fill: #f97316; }
      80%  { fill: #8b5cf6; }
      100% { fill: #ec4899; }
    }
  </style>

  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" class="text">
    ☕ Core Java • 🚀 Advanced Java • 🌱 Spring • 🧠 DSA • ⚛️ React • HTML • CSS • JS • MySQL • C++
  </text>
</svg>
